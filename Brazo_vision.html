<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brazo Robótico — 4 Servos</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #0e0b1a; color: #e0d9f7; padding: 1.5rem; min-height: 100vh; }
    .wrapper { max-width: 720px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }
 
    /* Header */
    .header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 4px; }
    .header-left { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 500; }
 
    /* Badges */
    .badge { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 8px; display: inline-flex; align-items: center; gap: 5px; }
    .badge-warn { background: #2e2200; color: #f0b429; }
    .badge-ok   { background: #0f1f2e; color: #7c6aff; border: 0.5px solid #7c6aff; }
    .badge-err  { background: #2e0a1a; color: #f87191; }
    .badge-dev-on  { background: #0a2e1a; color: #3ecf8e; }
    .badge-dev-off { background: #2e2200; color: #f0b429; }
 
    /* Login overlay */
    #login-overlay {
      position: fixed; inset: 0; background: #0e0b1a;
      display: flex; align-items: center; justify-content: center; z-index: 100;
    }
    .login-card {
      background: #17112e; border: 0.5px solid rgba(160,130,255,0.25);
      border-radius: 16px; padding: 2rem; width: 100%; max-width: 360px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .login-title { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 500; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: #7c6aaa; }
    .field input {
      background: #1e1638; border: 0.5px solid rgba(160,130,255,0.25);
      border-radius: 8px; padding: 9px 12px; color: #e0d9f7; font-size: 13px; outline: none;
    }
    .field input:focus { border-color: #7c6aff; }
    .login-btn {
      padding: 10px; font-size: 13px; font-weight: 500;
      background: #7c6aff; border: none; border-radius: 8px;
      color: #fff; cursor: pointer; transition: opacity 0.15s;
    }
    .login-btn:hover { opacity: 0.88; }
    .login-err { font-size: 12px; color: #f87191; display: none; }
 
    /* Main content */
    #main { display: none; }
 
    /* Grid servos */
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 520px) { .grid { grid-template-columns: 1fr; } }
 
    .servo-card {
      background: #17112e; border: 0.5px solid rgba(160,130,255,0.18);
      border-radius: 12px; padding: 1.1rem 1.25rem 1rem;
      display: flex; flex-direction: column; gap: 10px;
      transition: border-color 0.2s;
    }
    .servo-card.pulse { border-color: rgba(124,106,255,0.6); }
 
    .servo-header { display: flex; align-items: center; justify-content: space-between; }
    .servo-title { font-size: 13px; font-weight: 500; color: #c4b5fd; display: flex; align-items: center; gap: 6px; }
    .servo-angle { display: flex; align-items: baseline; gap: 3px; }
    .servo-angle .num { font-size: 28px; font-weight: 500; color: #c4b5fd; line-height: 1; }
    .servo-angle .deg { font-size: 13px; color: #7c6aaa; }
 
    .arc-wrap { display: flex; justify-content: center; }
    .arc-bg-s   { fill: none; stroke: rgba(124,106,255,0.12); stroke-width: 7; }
    .arc-fill-s { fill: none; stroke: #7c6aff; stroke-width: 7; stroke-linecap: round; transition: stroke-dashoffset 0.18s ease; }
    .needle-s   { transform-origin: 70px 70px; transition: transform 0.18s ease; }
 
    input[type=range] { -webkit-appearance: none; width: 100%; height: 4px; border-radius: 4px; background: rgba(124,106,255,0.18); outline: none; cursor: pointer; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #7c6aff; cursor: pointer; box-shadow: 0 0 6px rgba(124,106,255,0.5); transition: transform 0.1s; }
    input[type=range]::-webkit-slider-thumb:active { transform: scale(1.25); }
 
    .slider-ticks { display: flex; justify-content: space-between; font-size: 10px; color: #4a3f6b; margin-top: 4px; }
 
    .presets { display: flex; gap: 5px; }
    .preset { flex: 1; padding: 5px 0; font-size: 11px; border: 0.5px solid rgba(160,130,255,0.18); border-radius: 6px; background: #1e1638; color: #9d8ec7; cursor: pointer; transition: all 0.12s; text-align: center; }
    .preset:hover { border-color: #7c6aff; color: #c4b5fd; background: #251d47; }
 
    /* Panel inferior */
    .bottom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 520px) { .bottom-grid { grid-template-columns: 1fr; } }
 
    .card { background: #17112e; border: 0.5px solid rgba(160,130,255,0.18); border-radius: 12px; padding: 1.1rem 1.25rem; }
    .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #7c6aaa; margin-bottom: 10px; }
 
    .mode-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .mode-btn { flex: 1; padding: 9px 6px; font-size: 12px; font-weight: 500; border: 0.5px solid rgba(160,130,255,0.2); border-radius: 8px; background: #1e1638; color: #7c6aaa; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; transition: all 0.15s; }
    .mode-btn:hover  { background: #251d47; color: #c4b5fd; }
    .mode-btn.active { border-color: #7c6aff; background: #1e1050; color: #c4b5fd; }
 
    .reset-btn { width: 100%; padding: 9px; font-size: 12px; font-weight: 500; border: 0.5px solid rgba(160,130,255,0.25); border-radius: 8px; background: #1e1638; color: #9d8ec7; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.15s; }
    .reset-btn:hover { border-color: #7c6aff; color: #c4b5fd; background: #251d47; }
 
    .stat-line { display: flex; justify-content: space-between; font-size: 12px; color: #7c6aaa; padding: 3px 0; border-bottom: 0.5px solid rgba(160,130,255,0.07); }
    .stat-line:last-child { border-bottom: none; }
    .stat-line span:last-child { font-family: monospace; font-size: 11px; color: #c4b5fd; }
 
    /* Dispositivo banner */
    #device-banner {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; border-radius: 10px;
      border: 0.5px solid rgba(160,130,255,0.18);
      background: #17112e; font-size: 13px;
    }
    .device-info { display: flex; align-items: center; gap: 10px; }
    .device-dot { width: 8px; height: 8px; border-radius: 50%; background: #f0b429; flex-shrink: 0; transition: background 0.3s; }
    .device-dot.on { background: #3ecf8e; }
    .device-dot.off { background: #f87191; }
    #device-label { color: #c4b5fd; font-weight: 500; }
    #device-since { font-size: 11px; color: #7c6aaa; }
    #logout-btn { font-size: 11px; border: 0.5px solid rgba(160,130,255,0.2); background: #1e1638; color: #9d8ec7; padding: 5px 12px; border-radius: 6px; cursor: pointer; }
    #logout-btn:hover { border-color: #7c6aff; color: #c4b5fd; }
 
    /* Log */
    .log-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .log-clear { font-size: 11px; border: none; background: none; color: #4a3f6b; cursor: pointer; }
    .log-clear:hover { color: #7c6aaa; }
    #log { max-height: 90px; overflow-y: auto; display: flex; flex-direction: column-reverse; }
    .log-row { font-size: 11px; font-family: monospace; padding: 2px 0; border-bottom: 0.5px solid rgba(160,130,255,0.07); display: flex; gap: 8px; }
    .log-ts  { color: #4a3f6b; flex-shrink: 0; }
    .log-ok  { color: #7c6aff; }
    .log-err { color: #f87191; }
    .log-inf { color: #7c6aaa; }
    .log-dev { color: #3ecf8e; }
 
    .divider { border: none; border-top: 0.5px solid rgba(160,130,255,0.1); margin: 8px 0; }
  </style>
</head>
<body>
 
<!-- ── Login overlay ──────────────────────────────────── -->
<div id="login-overlay">
  <div class="login-card">
    <div class="login-title">
      <i class="ti ti-lock" style="font-size:20px;color:#7c6aff;" aria-hidden="true"></i>
      Acceso al panel
    </div>
    <div class="field">
      <label>Usuario</label>
      <input type="text" id="inp-user" placeholder="usuario" autocomplete="username" />
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="inp-pass" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <span class="login-err" id="login-err">
      <i class="ti ti-alert-circle" style="font-size:12px;vertical-align:-1px;"></i>
      No se pudo conectar. Verifica los datos.
    </span>
    <button class="login-btn" onclick="conectar()">
      <i class="ti ti-plug-connected" style="font-size:13px;vertical-align:-1px;"></i>
      Conectar
    </button>
  </div>
</div>
 
<!-- ── Panel principal ────────────────────────────────── -->
<div class="wrapper" id="main">
 
  <div class="header">
    <div class="header-left">
      <span style="font-size:13px;font-weight:700;color:#7c6aff;letter-spacing:0.08em;">TADASHY</span>
      <span style="color:rgba(160,130,255,0.3);font-size:13px;">·</span>
      <i class="ti ti-robot" style="font-size:18px;color:#9d8ec7;" aria-hidden="true"></i>
      <span style="color:#9d8ec7;font-size:14px;">4 servos</span>
    </div>
    <span id="conn-badge" class="badge badge-warn">
      <i class="ti ti-wifi-off" style="font-size:12px"></i> Conectando…
    </span>
  </div>
 
  <!-- Banner estado del ESP32 -->
  <div id="device-banner">
    <div class="device-info">
      <div class="device-dot" id="device-dot"></div>
      <div>
        <div id="device-label">ESP32 — sin datos aún</div>
        <div id="device-since"></div>
      </div>
    </div>
    <button id="logout-btn" onclick="logout()">
      <i class="ti ti-logout" style="font-size:11px;vertical-align:-1px;"></i> Salir
    </button>
  </div>
 
  <!-- Grid 4 servos -->
  <div class="grid" id="servo-grid"></div>
 
  <!-- Panel inferior -->
  <div class="bottom-grid">
    <div class="card">
      <p class="section-label">Modo de operación</p>
      <div class="mode-row">
        <button class="mode-btn active" id="btn-manual" onclick="setModo('manual')">
          <i class="ti ti-hand-finger" aria-hidden="true"></i> Manual
        </button>
        <button class="mode-btn" id="btn-auto" onclick="setModo('auto')">
          <i class="ti ti-cpu" aria-hidden="true"></i> Auto
        </button>
        <a href="brazo_vision.html" class="mode-btn" style="text-decoration:none;" onclick="setModo('vision')">
          <i class="ti ti-eye" aria-hidden="true"></i> Visión
        </a>
      </div>
      <button class="reset-btn" onclick="resetAll()">
        <i class="ti ti-refresh" aria-hidden="true"></i> Centrar todos (90°)
      </button>
    </div>
    <div class="card">
      <p class="section-label">Estado</p>
      <div class="stat-line"><span>Publicaciones</span><span id="pub-total">0</span></div>
      
      <div class="stat-line"><span>Puerto</span><span>8883 (TLS)</span></div>
      <div class="stat-line"><span>Throttle</span><span>40 ms</span></div>
    </div>
  </div>
 
  <!-- Log -->
  <div class="card">
    <div class="log-header">
      <p class="section-label" style="margin:0;">
        <i class="ti ti-terminal-2" style="font-size:12px;vertical-align:-1px;" aria-hidden="true"></i>
        Log de actividad
      </p>
      <button class="log-clear" onclick="clearLog()">limpiar</button>
    </div>
    <div id="log"></div>
  </div>
 
</div>
 
<script>
// ── Estado global ─────────────────────────────────────────
let client = null;
let pubTotal = 0;
let ultimoEnvio = [0,0,0,0];
const INTERVALO = 40;
const servoNames = ['Base','Hombro','Codo','Muñeca'];
const servoIcons = ['ti-rotate-clockwise','ti-arrow-up','ti-fold-up','ti-hand-grab'];
 
// ── Log ───────────────────────────────────────────────────
const logEl = document.getElementById('log');
function addLog(msg, tipo='inf') {
  const ts = new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const row = document.createElement('div');
  row.className = 'log-row';
  row.innerHTML = `<span class="log-ts">${ts}</span><span class="log-${tipo}">${msg}</span>`;
  logEl.prepend(row);
  while (logEl.children.length > 50) logEl.removeChild(logEl.lastChild);
}
function clearLog() { logEl.innerHTML = ''; }
 
// ── Device status ─────────────────────────────────────────
let deviceOnline = false;
let lastSeenInterval = null;
let connectedAt = null;
 
function setDevice(online) {
  deviceOnline = online;
  const dot   = document.getElementById('device-dot');
  const label = document.getElementById('device-label');
  const since = document.getElementById('device-since');
 
  if (online) {
    dot.className   = 'device-dot on';
    label.textContent = 'ESP32 — conectado';
    connectedAt     = Date.now();
    clearInterval(lastSeenInterval);
    lastSeenInterval = setInterval(() => {
      const secs = Math.floor((Date.now() - connectedAt) / 1000);
      since.textContent = `Activo hace ${secs}s`;
    }, 1000);
    addLog('ESP32 en línea', 'dev');
  } else {
    dot.className   = 'device-dot off';
    label.textContent = 'ESP32 — desconectado';
    clearInterval(lastSeenInterval);
    since.textContent = 'Sin señal';
    addLog('ESP32 fuera de línea', 'err');
  }
}
 
// ── Construir cards de servos ─────────────────────────────
function buildCards() {
  const grid = document.getElementById('servo-grid');
  grid.innerHTML = '';
  const arcLen = (Math.PI * 58).toFixed(1);
  const arcHalf = (Math.PI * 29).toFixed(1);
 
  for (let i = 1; i <= 4; i++) {
    grid.innerHTML += `
    <div class="servo-card" id="card${i}">
      <div class="servo-header">
        <div class="servo-title">
          <i class="ti ${servoIcons[i-1]}" style="font-size:14px;color:#7c6aaa;" aria-hidden="true"></i>
          Servo ${i} — ${servoNames[i-1]}
        </div>
        <div class="servo-angle">
          <span class="num" id="num${i}">90</span>
          <span class="deg">°</span>
        </div>
      </div>
      <div class="arc-wrap">
        <svg width="140" height="82" viewBox="0 0 140 82" role="img" aria-label="Ángulo servo ${i}">
          <path class="arc-bg-s"   d="M 12,70 A 58,58 0 0,1 128,70"/>
          <path class="arc-fill-s" id="arc${i}"
                d="M 12,70 A 58,58 0 0,1 128,70"
                stroke-dasharray="${arcLen}" stroke-dashoffset="${arcHalf}"/>
          <line id="needle${i}" x1="70" y1="70" x2="70" y2="16"
                stroke="#a78bff" stroke-width="2" stroke-linecap="round" class="needle-s"/>
          <circle cx="70" cy="70" r="4" fill="#7c6aff"/>
          <text x="10"  y="80" font-size="9" fill="#4a3f6b">0°</text>
          <text x="62"  y="12" font-size="9" fill="#4a3f6b">90°</text>
          <text x="118" y="80" font-size="9" fill="#4a3f6b" text-anchor="end">180°</text>
        </svg>
      </div>
      <input type="range" min="0" max="180" value="90" step="1"
             id="slider${i}" oninput="mover(${i}, this.value)"/>
      <div class="slider-ticks"><span>0°</span><span>90°</span><span>180°</span></div>
      <div class="presets">
        <button class="preset" onclick="irA(${i},0)">0°</button>
        <button class="preset" onclick="irA(${i},45)">45°</button>
        <button class="preset" onclick="irA(${i},90)">90°</button>
        <button class="preset" onclick="irA(${i},135)">135°</button>
        <button class="preset" onclick="irA(${i},180)">180°</button>
      </div>
    </div>`;
  }
}
 
// ── Ángulo visual ─────────────────────────────────────────
function updateAngle(i, val) {
  const v = parseInt(val);
  const arcLen = Math.PI * 58;
  document.getElementById('num'    + i).textContent = v;
  document.getElementById('arc'    + i).style.strokeDashoffset = (arcLen - (v/180)*arcLen).toFixed(1);
  document.getElementById('needle' + i).style.transform = `rotate(${-90 + v}deg)`;
}
 
// ── Mover servo ───────────────────────────────────────────
function mover(servo, valor) {
  updateAngle(servo, valor);
  const ahora = Date.now();
  if (ahora - ultimoEnvio[servo-1] > INTERVALO && client && client.connected) {
    client.publish('brazo/servo/' + servo, String(valor));
    ultimoEnvio[servo-1] = ahora;
    pubTotal++;
    document.getElementById('pub-total').textContent = pubTotal;
    const card = document.getElementById('card' + servo);
    card.classList.add('pulse');
    setTimeout(() => card.classList.remove('pulse'), 300);
    addLog(`Servo ${servo} (${servoNames[servo-1]}) → ${valor}°`, 'ok');
  }
}
 
function irA(servo, val) {
  document.getElementById('slider' + servo).value = val;
  updateAngle(servo, val);
  if (client && client.connected) {
    client.publish('brazo/servo/' + servo, String(val));
    pubTotal++;
    document.getElementById('pub-total').textContent = pubTotal;
    addLog(`Preset servo ${servo} → ${val}°`, 'ok');
  }
}
 
function resetAll() {
  for (let i = 1; i <= 4; i++) irA(i, 90);
  addLog('Todos centrados a 90°', 'inf');
}
 
function setModo(modo) {
  document.getElementById('btn-manual').classList.toggle('active', modo==='manual');
  document.getElementById('btn-auto').classList.toggle('active', modo==='auto');
  if (client && client.connected) client.publish('brazo/modo', modo);
  addLog(`Modo → ${modo}`, 'inf');
}
 
// ── Conectar con credenciales ─────────────────────────────
const MQTT_HOST = '41287df21912452aa44d6b4f228a5f6d.s1.eu.hivemq.cloud';
 
function conectar(user, pass) {
  if (!user) user = document.getElementById('inp-user').value.trim();
  if (!pass) pass = document.getElementById('inp-pass').value;
  const errEl = document.getElementById('login-err');
  errEl.style.display = 'none';
 
  if (!user || !pass) {
    errEl.textContent = 'Completa usuario y contraseña.';
    errEl.style.display = 'block';
    return;
  }
 
  const url = `wss://${MQTT_HOST}:8884/mqtt`;
  addLog('Conectando al broker…', 'inf');
 
  client = mqtt.connect(url, {
    username: user,
    password: pass,
    clientId: 'web_brazo_' + Math.random().toString(16).slice(2,8),
    connectTimeout: 6000,
    reconnectPeriod: 2000,
    keepalive: 30,
  });
 
  // Reconectar al volver a la pestaña
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && client && !client.connected) {
      addLog('Pestaña activa — reconectando…', 'inf');
      client.reconnect();
    }
  });
 
  client.on('connect', () => {
    // Guardar credenciales para la próxima vez
    localStorage.setItem('brazo_user', user);
    localStorage.setItem('brazo_pass', pass);
 
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('main').style.display = 'flex';
    document.getElementById('main').style.flexDirection = 'column';
    document.getElementById('conn-badge').className = 'badge badge-ok';
    document.getElementById('conn-badge').innerHTML = '<i class="ti ti-wifi" style="font-size:12px"></i> Conectado';
 
    client.subscribe('brazo/status');
    for (let i = 1; i <= 4; i++) client.subscribe('brazo/servo/feedback/' + i);
    addLog('Broker conectado', 'ok');
    buildCards();
  });
 
  client.on('error', (e) => {
    // Si falla con credenciales guardadas, borrarlas
    localStorage.removeItem('brazo_user');
    localStorage.removeItem('brazo_pass');
    errEl.textContent = 'No se pudo conectar. Verifica usuario y contraseña.';
    errEl.style.display = 'block';
    document.getElementById('login-overlay').style.display = 'flex';
    document.getElementById('main').style.display = 'none';
    document.getElementById('conn-badge').className = 'badge badge-err';
    document.getElementById('conn-badge').innerHTML = '<i class="ti ti-wifi-off" style="font-size:12px"></i> Error';
    addLog('Error de conexión: ' + (e.message || ''), 'err');
    client.end();
  });
 
  client.on('offline', () => {
    document.getElementById('conn-badge').className = 'badge badge-warn';
    document.getElementById('conn-badge').innerHTML = '<i class="ti ti-wifi-off" style="font-size:12px"></i> Desconectado';
    addLog('Broker desconectado', 'err');
  });
 
  client.on('message', (topic, payload) => {
    const msg = payload.toString();
    if (topic === 'brazo/status') {
      setDevice(msg === 'online');
      return;
    }
    // Feedback de ángulo real del ESP32 → actualizar arco y slider
    const match = topic.match(/^brazo\/servo\/feedback\/(\d+)$/);
    if (match) {
      const idx = parseInt(match[1]);
      const angle = parseInt(msg);
      if (idx >= 1 && idx <= 4 && angle >= 0 && angle <= 180) {
        updateAngle(idx, angle);
        // Solo mueve el slider si el usuario no lo está tocando
        const slider = document.getElementById('slider' + idx);
        if (slider && document.activeElement !== slider) {
          slider.value = angle;
        }
      }
    }
  });
}
 
// ── Auto-login al cargar ──────────────────────────────────
(function autoLogin() {
  const user = localStorage.getItem('brazo_user');
  const pass = localStorage.getItem('brazo_pass');
  if (user && pass) {
    // Ocultar login de inmediato, sin esperar al evento load
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('inp-user').value = user;
    document.getElementById('inp-pass').value = pass;
    conectar(user, pass);
  }
})();
 
// ── Logout ────────────────────────────────────────────────
function logout() {
  localStorage.removeItem('brazo_user');
  localStorage.removeItem('brazo_pass');
  if (client) { client.end(); client = null; }
  clearInterval(lastSeenInterval);
  document.getElementById('main').style.display = 'none';
  document.getElementById('login-overlay').style.display = 'flex';
  document.getElementById('inp-user').value = '';
  document.getElementById('inp-pass').value = '';
  addLog('Sesión cerrada', 'inf');
}
</script>

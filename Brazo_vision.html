<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Brazo Robótico — Visión Artificial</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

<style>
/* NO TOQUÉ NADA VISUAL */
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

body{
font-family:Arial,sans-serif;
background:#0e0b1a;
color:#e0d9f7;
min-height:100vh;
overflow-x:hidden;
}

#login-overlay{
position:fixed;
inset:0;
background:#0e0b1a;
display:flex;
align-items:center;
justify-content:center;
z-index:200;
}

.login-card{
background:#17112e;
border:.5px solid rgba(160,130,255,.25);
border-radius:16px;
padding:2rem;
width:100%;
max-width:360px;
display:flex;
flex-direction:column;
gap:14px;
}

.login-title{
display:flex;
align-items:center;
gap:10px;
font-size:16px;
font-weight:500;
}

.field{
display:flex;
flex-direction:column;
gap:5px;
}

.field label{
font-size:11px;
font-weight:600;
letter-spacing:.07em;
text-transform:uppercase;
color:#7c6aaa;
}

.field input{
background:#1e1638;
border:.5px solid rgba(160,130,255,.25);
border-radius:8px;
padding:9px 12px;
color:#e0d9f7;
font-size:13px;
outline:none;
}

.field input:focus{
border-color:#7c6aff;
}

.login-btn{
padding:10px;
font-size:13px;
font-weight:500;
background:#7c6aff;
border:none;
border-radius:8px;
color:#fff;
cursor:pointer;
transition:opacity .15s;
}

.login-btn:hover{
opacity:.88;
}

.login-err{
font-size:12px;
color:#f87191;
display:none;
}

#app{
display:none;
flex-direction:column;
height:100vh;
}

.app-header{
display:flex;
align-items:center;
justify-content:space-between;
padding:12px 20px;
background:#17112e;
border-bottom:.5px solid rgba(160,130,255,.18);
flex-shrink:0;
}

.header-left{
display:flex;
align-items:center;
gap:10px;
font-size:15px;
font-weight:500;
color:#c4b5fd;
}

.header-right{
display:flex;
align-items:center;
gap:10px;
}

.badge{
font-size:11px;
font-weight:600;
padding:4px 10px;
border-radius:8px;
display:inline-flex;
align-items:center;
gap:5px;
}

.badge-warn{
background:#2e2200;
color:#f0b429;
}

.badge-ok{
background:#0f1f2e;
color:#7c6aff;
border:.5px solid #7c6aff;
}

.badge-err{
background:#2e0a1a;
color:#f87191;
}

.badge-dev-on{
background:#0a2e1a;
color:#3ecf8e;
border:.5px solid #3ecf8e;
}

.badge-dev-off{
background:#2e1a00;
color:#f0b429;
}

#logout-btn{
font-size:11px;
border:.5px solid rgba(160,130,255,.2);
background:#1e1638;
color:#9d8ec7;
padding:5px 12px;
border-radius:6px;
cursor:pointer;
}

.main-layout{
display:grid;
grid-template-columns:1fr 300px;
flex:1;
overflow:hidden;
}

@media(max-width:860px){
.main-layout{
grid-template-columns:1fr;
}
}

.camera-side{
display:flex;
flex-direction:column;
border-right:.5px solid rgba(160,130,255,.18);
overflow:hidden;
}

.cam-toolbar{
display:flex;
align-items:center;
gap:10px;
flex-wrap:wrap;
padding:10px 16px;
background:#17112e;
border-bottom:.5px solid rgba(160,130,255,.18);
flex-shrink:0;
}

.cam-btn{
padding:7px 16px;
font-size:12px;
font-weight:500;
border:.5px solid rgba(160,130,255,.3);
border-radius:8px;
background:#1e1638;
color:#9d8ec7;
cursor:pointer;
display:flex;
align-items:center;
gap:6px;
transition:all .15s;
}

.cam-btn:hover{
border-color:#7c6aff;
color:#c4b5fd;
}

.mode-group{
display:flex;
gap:6px;
margin-left:auto;
}

.mode-pill{
padding:6px 14px;
font-size:11px;
font-weight:500;
border:.5px solid rgba(160,130,255,.2);
border-radius:20px;
background:#1e1638;
color:#7c6aaa;
cursor:pointer;
}

.mode-pill.active{
border-color:#7c6aff;
background:#1e1050;
color:#c4b5fd;
}

.fps-strip{
display:flex;
align-items:center;
gap:14px;
padding:6px 16px;
background:rgba(0,0,0,.3);
border-bottom:.5px solid rgba(160,130,255,.1);
flex-shrink:0;
font-size:11px;
}

.fps-label{
color:#4a3f6b;
text-transform:uppercase;
letter-spacing:.06em;
font-size:10px;
}

.fps-val{
color:#7c6aff;
font-family:monospace;
min-width:28px;
}

.hand-box{
width:22px;
height:22px;
border:.5px solid rgba(160,130,255,.2);
border-radius:5px;
display:flex;
align-items:center;
justify-content:center;
font-size:13px;
transition:all .2s;
}

.hand-box.detected{
border-color:#3ecf8e;
background:rgba(62,207,142,.1);
}

.cam-wrapper{
flex:1;
position:relative;
background:#000;
overflow:hidden;
}

#videoElement{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
transform:scaleX(-1);
opacity:.82;
}

#outputCanvas{
position:absolute;
inset:0;
width:100%;
height:100%;
transform:scaleX(-1);
}

.no-cam-msg{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:12px;
color:#4a3f6b;
}

.corner{
position:absolute;
width:24px;
height:24px;
border-color:rgba(124,106,255,.5);
border-style:solid;
}

.corner.tl{top:14px;left:14px;border-width:2px 0 0 2px;}
.corner.tr{top:14px;right:14px;border-width:2px 2px 0 0;}
.corner.bl{bottom:14px;left:14px;border-width:0 0 2px 2px;}
.corner.br{bottom:14px;right:14px;border-width:0 2px 2px 0;}

.gesture-badge{
position:absolute;
bottom:18px;
left:50%;
transform:translateX(-50%);
background:rgba(14,11,26,.88);
border:.5px solid #7c6aff;
padding:7px 22px;
border-radius:20px;
font-size:12px;
font-weight:600;
letter-spacing:.1em;
color:#c4b5fd;
text-transform:uppercase;
opacity:0;
transition:opacity .25s;
}

.gesture-badge.show{
opacity:1;
}

.right-panel{
display:flex;
flex-direction:column;
background:#17112e;
overflow-y:auto;
}
</style>
</head>

<body>

<div id="login-overlay">
<div class="login-card">
<div class="login-title">
<i class="ti ti-lock" style="font-size:20px;color:#7c6aff;"></i>
Acceso al panel
</div>

<div class="field">
<label>Usuario</label>
<input type="text" id="inp-user">
</div>

<div class="field">
<label>Contraseña</label>
<input type="password" id="inp-pass">
</div>

<span class="login-err" id="login-err"></span>

<button class="login-btn" onclick="conectar()">
<i class="ti ti-plug-connected"></i>
Conectar
</button>

</div>
</div>

<div id="app">

<div class="app-header">

<div class="header-left">
<span style="font-size:13px;font-weight:700;color:#7c6aff;">TADASHY</span>
<span>·</span>
<i class="ti ti-eye"></i>
<span>Visión artificial</span>
</div>

<div class="header-right">

<span id="device-badge" class="badge badge-dev-off">
<i class="ti ti-cpu"></i>
ESP32 offline
</span>

<span id="conn-badge" class="badge badge-warn">
<i class="ti ti-wifi-off"></i>
Conectando
</span>

<button id="logout-btn" onclick="logout()">
<i class="ti ti-logout"></i>
Salir
</button>

</div>

</div>

<div class="main-layout">

<div class="camera-side">

<div class="cam-toolbar">

<button class="cam-btn" id="startBtn" onclick="toggleCamera()">
<i class="ti ti-player-play"></i>
Iniciar cámara
</button>

<div class="mode-group">
<button class="mode-pill active" id="modePos" onclick="setMode('position')">
Posición
</button>

<button class="mode-pill" id="modeGest" onclick="setMode('gesture')">
Gestos
</button>
</div>

</div>

<div class="fps-strip">
<span class="fps-label">FPS</span>
<span class="fps-val" id="fpsVal">--</span>

<span class="fps-label">Mano</span>
<div class="hand-box" id="handBox">✋</div>

<span class="fps-label">Confianza</span>
<span class="fps-val" id="confVal">--%</span>

<span class="fps-label" id="modeLabel" style="margin-left:auto;">
Modo: Posición
</span>
</div>

<div class="cam-wrapper">

<div class="no-cam-msg" id="noCamMsg">
<i class="ti ti-camera-off icon"></i>
<p>Presiona Iniciar cámara</p>
</div>

<video id="videoElement" autoplay playsinline></video>
<canvas id="outputCanvas"></canvas>

<div class="gesture-badge" id="gestureBadge"></div>

</div>
</div>

<div class="right-panel"></div>

</div>
</div>

<script>
const MQTT_HOST='41287df21912452aa44d6b4f228a5f6d.s1.eu.hivemq.cloud';

let mqttClient=null;

let cameraRunning=false;
let controlMode='position';

let handsInstance=null;
let cameraInstance=null;

let lastFrameTime=performance.now();
let frameCounter=0;

let lastPublish=0;
let lastLog=0;

let gestureStableFrames=0;
let previousGesture=null;

let espTimeout=null;

const EMA_ALPHA=.18;

const smoothed={
base:90,
shoulder:90,
elbow:90,
wrist:90
};

const prevSent={
base:90,
shoulder:90,
elbow:90,
wrist:90
};

const videoEl=document.getElementById('videoElement');
const canvas=document.getElementById('outputCanvas');
const ctx=canvas.getContext('2d');

function clamp(v,min,max){
return Math.max(min,Math.min(max,Math.round(v)));
}

function ema(prev,next){
return prev+EMA_ALPHA*(next-prev);
}

function addLog(msg){
const now=Date.now();

if(now-lastLog<300){
return;
}

lastLog=now;

console.log(msg);
}

function setDevice(online){

const badge=document.getElementById('device-badge');

if(online){
badge.className='badge badge-dev-on';
badge.innerHTML='<i class="ti ti-cpu"></i> ESP32 conectado';
}else{
badge.className='badge badge-dev-off';
badge.innerHTML='<i class="ti ti-cpu"></i> ESP32 offline';
}
}

function deviceHeartbeat(){
clearTimeout(espTimeout);

setDevice(true);

espTimeout=setTimeout(()=>{
setDevice(false);
},5000);
}

function mqttPublishServos(data){

if(!mqttClient || !mqttClient.connected){
return;
}

const now=Date.now();

if(now-lastPublish<70){
return;
}

const deadZone=2;

if(
Math.abs(prevSent.base-data.base)<deadZone &&
Math.abs(prevSent.shoulder-data.shoulder)<deadZone &&
Math.abs(prevSent.elbow-data.elbow)<deadZone &&
Math.abs(prevSent.wrist-data.wrist)<deadZone
){
return;
}

lastPublish=now;

prevSent.base=data.base;
prevSent.shoulder=data.shoulder;
prevSent.elbow=data.elbow;
prevSent.wrist=data.wrist;

mqttClient.publish(
'brazo/servos',
JSON.stringify(data)
);
}

function conectar(user,pass){

if(!user){
user=document.getElementById('inp-user').value.trim();
}

if(!pass){
pass=document.getElementById('inp-pass').value;
}

mqttClient=mqtt.connect(`wss://${MQTT_HOST}:8884/mqtt`,{
username:user,
password:pass,
connectTimeout:6000,
reconnectPeriod:2000,
keepalive:30
});

mqttClient.on('connect',()=>{

localStorage.setItem('brazo_user',user);
localStorage.setItem('brazo_pass',pass);

document.getElementById('login-overlay').style.display='none';
document.getElementById('app').style.display='flex';

document.getElementById('conn-badge').className='badge badge-ok';
document.getElementById('conn-badge').innerHTML='<i class="ti ti-wifi"></i> Conectado';

mqttClient.subscribe('brazo/status');

});

mqttClient.on('message',(topic,payload)=>{

deviceHeartbeat();

});

mqttClient.on('offline',()=>{
document.getElementById('conn-badge').className='badge badge-warn';
});

mqttClient.on('error',()=>{
document.getElementById('conn-badge').className='badge badge-err';
});

}

window.addEventListener('load',()=>{

const user=localStorage.getItem('brazo_user');
const pass=localStorage.getItem('brazo_pass');

if(user && pass){
conectar(user,pass);
}

});

function logout(){

localStorage.clear();

if(mqttClient){
mqttClient.end();
}

stopCamera();

location.reload();

}

async function toggleCamera(){
cameraRunning ? stopCamera() : await startCamera();
}

async function startCamera(){

document.getElementById('noCamMsg').style.display='none';

if(!handsInstance){

handsInstance=new Hands({
locateFile:file=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

handsInstance.setOptions({

maxNumHands:1,

modelComplexity:1,

minDetectionConfidence:.82,
minTrackingConfidence:.78,

selfieMode:true

});

handsInstance.onResults(onResults);
}

cameraInstance=new Camera(videoEl,{

onFrame:async()=>{

canvas.width=videoEl.videoWidth;
canvas.height=videoEl.videoHeight;

await handsInstance.send({
image:videoEl
});

},

width:1280,
height:720

});

await cameraInstance.start();

const stream=videoEl.srcObject;

if(stream){

stream.getTracks().forEach(track=>{

track.onended=()=>{
stopCamera();
};

});

}

cameraRunning=true;

document.getElementById('startBtn').innerHTML=
'<i class="ti ti-player-stop"></i> Detener';

}

function stopCamera(){

if(cameraInstance){
cameraInstance.stop();
cameraInstance=null;
}

ctx.clearRect(0,0,canvas.width,canvas.height);

cameraRunning=false;

document.getElementById('noCamMsg').style.display='flex';

document.getElementById('fpsVal').textContent='--';

document.getElementById('handBox').classList.remove('detected');

document.getElementById('startBtn').innerHTML=
'<i class="ti ti-player-play"></i> Iniciar cámara';

}

function updateFPS(){

frameCounter++;

const now=performance.now();

if(now-lastFrameTime>=1000){

document.getElementById('fpsVal').textContent=frameCounter;

frameCounter=0;
lastFrameTime=now;
}
}

function onResults(results){

updateFPS();

ctx.save();

ctx.clearRect(0,0,canvas.width,canvas.height);

if(results.multiHandLandmarks &&
results.multiHandLandmarks.length){

document.getElementById('handBox').classList.add('detected');

const lm=results.multiHandLandmarks[0];

const handedness=results.multiHandedness?.[0]?.label ?? 'Right';

const isRightHand=handedness==='Left';

const confidence=Math.round(
(results.multiHandedness?.[0]?.score ?? .95)*100
);

document.getElementById('confVal').textContent=
confidence+'%';

drawConnectors(
ctx,
lm,
HAND_CONNECTIONS,
{
color:'rgba(124,106,255,.8)',
lineWidth:4
}
);

drawLandmarks(
ctx,
lm,
{
color:'#ffffff',
fillColor:'#7c6aff',
radius:4
}
);

processEnhancedTracking(lm,isRightHand);

}else{

document.getElementById('handBox').classList.remove('detected');

}

ctx.restore();

}

function processEnhancedTracking(lm,isRightHand){

const wrist=lm[0];
const thumb=lm[4];
const index=lm[8];

const rawBase=clamp((1-wrist.x)*180,0,180);

const rawShoulder=clamp((1-wrist.y)*170,10,170);

const distance=Math.hypot(
thumb.x-index.x,
thumb.y-index.y
);

const rawGrip=clamp(
((distance-.03)/.17)*100,
0,
100
);

const dy=wrist.y-index.y;

const rawElbow=clamp(
90+(dy*260),
10,
170
);

const palmTilt=isRightHand
? (lm[17].y-lm[5].y)
: (lm[5].y-lm[17].y);

const rawWrist=clamp(
90+(palmTilt*280),
0,
180
);

smoothed.base=ema(smoothed.base,rawBase);
smoothed.shoulder=ema(smoothed.shoulder,rawShoulder);
smoothed.elbow=ema(smoothed.elbow,rawElbow);
smoothed.wrist=ema(smoothed.wrist,rawWrist);

const data={
base:Math.round(smoothed.base),
shoulder:Math.round(smoothed.shoulder),
elbow:Math.round(smoothed.elbow),
wrist:Math.round(smoothed.wrist),
grip:rawGrip
};

mqttPublishServos(data);

if(controlMode==='gesture'){
processGestureMode(lm,isRightHand);
}
}

const GESTURES={
OPEN:'ABIERTO',
FIST:'PUÑO',
POINT:'APUNTAR',
PEACE:'PAZ'
};

function processGestureMode(lm,isRightHand){

const gesture=detectGesture(lm,isRightHand);

if(!gesture){
return;
}

if(previousGesture===gesture){
gestureStableFrames++;
}else{
gestureStableFrames=0;
}

previousGesture=gesture;

if(gestureStableFrames<6){
return;
}

showGesture(gesture);

}

function detectGesture(lm,isRightHand){

const tips=[4,8,12,16,20];
const mids=[3,6,10,14,18];

const fingers=tips.map((tip,i)=>{

if(i===0){

return isRightHand
? lm[tip].x<lm[mids[i]].x
: lm[tip].x>lm[mids[i]].x;

}

return lm[tip].y<lm[mids[i]].y;

});

const [thumb,index,middle,ring,pinky]=fingers;

if(thumb && index && middle && ring && pinky){
return GESTURES.OPEN;
}

if(!index && !middle && !ring && !pinky){
return GESTURES.FIST;
}

if(index && !middle && !ring){
return GESTURES.POINT;
}

if(index && middle && !ring){
return GESTURES.PEACE;
}

return null;
}

function showGesture(txt){

const badge=document.getElementById('gestureBadge');

badge.textContent=txt;

badge.classList.add('show');

clearTimeout(window.gestureTimer);

window.gestureTimer=setTimeout(()=>{
badge.classList.remove('show');
},1200);

}

function setMode(mode){

controlMode=mode;

document.getElementById('modePos').classList.toggle(
'active',
mode==='position'
);

document.getElementById('modeGest').classList.toggle(
'active',
mode==='gesture'
);

document.getElementById('modeLabel').textContent=
'Modo: '+(mode==='position'?'Posición':'Gestos');

}
</script>

</body>
</html>
